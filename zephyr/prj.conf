# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_CBPRINTF_FP_SUPPORT=y

# I2C
CONFIG_I2C=y

# Sensors
CONFIG_SENSOR=y

# ADC
CONFIG_ADC=y

# GPIO
CONFIG_GPIO=y

# Regulator (pour RF switch antenne céramique : rfsw_pwr P2.03 + rfsw_ctl P2.05)
CONFIG_REGULATOR=y

# BLE
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Myco"
